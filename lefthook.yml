commit-msg:
    jobs:
        - name: commitlint
          run: pnpm commitlint --edit {1}

pre-commit:
    parallel: true
    jobs:
        - name: oxlint
          glob: '*.{js,ts,jsx,tsx,astro,mjs}'
          run: pnpm oxlint --type-aware {staged_files}
        - name: oxfmt
          glob: '*.{js,ts,jsx,tsx,astro,mjs,json,css}'
          run: pnpm oxfmt --check {staged_files}
        - name: knip
          run: pnpm knip
        - name: jscpd
          run: pnpm jscpd
